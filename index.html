<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANT£KNIGHT_777 // ZIG-ZAG SHOWCASE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600;800&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root { --kolor-tla: #050000; --kolor-tekstu: #ffffff; --kolor-tekstu-ciemny: #a1a1aa; --czerwien-zywa: #ff0015; --czerwien-ciemna: #5c0008; --bordo: #8a000b; --pomarancz-ognisty: #ff4d00; --czcionka-glowna: 'Inter', sans-serif; --czcionka-tytuly: 'Syne', sans-serif; --czcionka-graffiti: 'Bangers', cursive; }
        
        /* Zabezpieczenie przed wysuwaniem się strony */
        html, body { width: 100%; overflow-x: hidden; position: relative; margin: 0; padding: 0; }

        /* LOADING SCREEN */
        #loading-screen { position: fixed; inset: 0; background: var(--kolor-tla); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        #logo-loading { width: 80%; max-width: 400px; margin-bottom: 30px; animation: pulsowanie 2s infinite; }
        .loader-shell { width: 250px; height: 12px; border: 2px solid var(--czerwien-zywa); border-radius: 20px; padding: 2px; background: rgba(0,0,0,0.5); }
        #loader-bar { width: 0%; height: 100%; background: var(--czerwien-zywa); border-radius: 10px; transition: width 0.1s linear; box-shadow: 0 0 10px var(--czerwien-zywa); }
        @keyframes pulsowanie { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--kolor-tla); color: var(--kolor-tekstu); font-family: var(--czcionka-glowna); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        
        #centralne-graffiti { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: var(--czcionka-graffiti); font-size: 28vw; color: var(--czerwien-ciemna); text-shadow: 0 0 20px rgba(92, 0, 8, 0.5); z-index: -1; pointer-events: none; opacity: 0.5; }
        
        .glowna-nawigacja { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0)); backdrop-filter: blur(5px); border-bottom: 1px solid rgba(138, 0, 11, 0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .nawigacja-kontener { width: 100%; max-width: 1200px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--czcionka-graffiti); font-size: 2.5rem; background: linear-gradient(45deg, var(--czerwien-zywa), var(--pomarancz-ognisty)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }
        .menu-link { font-weight: 800; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        
        .sekcja-hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero-z-strzalkami { display: flex; align-items: center; justify-content: center; gap: 50px; width: 100%; }
        
        .strzalki-grupa { display: flex; flex-direction: column; gap: 5px; }
        .strzalka-w-dol { font-family: var(--czcionka-tytuly); font-weight: 800; font-size: 4rem; color: var(--pomarancz-ognisty); transform: rotate(90deg); display: inline-block; text-shadow: 0 0 15px rgba(255, 77, 0, 0.6); animation: pulsowanieStrzalki 1.5s infinite; }
        @keyframes pulsowanieStrzalki { 0%, 100% { transform: rotate(90deg) translateX(0); opacity: 0.5; } 50% { transform: rotate(90deg) translateX(15px); opacity: 1; } }

        .profil-kontener { display: flex; flex-direction: column; align-items: center; gap: 30px; background: rgba(10, 0, 0, 0.7); padding: 40px 60px; border-radius: 20px; border: 1px solid var(--bordo); box-shadow: 0 15px 40px rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 10; }
        .nazwa-uzytkownika { font-family: var(--czcionka-tytuly); font-size: 3.5rem; color: var(--kolor-tekstu); text-transform: uppercase; margin: 0; }
        .przycisk-kanal { font-family: var(--czcionka-glowna); font-weight: 800; color: var(--kolor-tekstu); background: linear-gradient(45deg, var(--czerwien-ciemna), var(--czerwien-zywa)); padding: 16px 45px; border-radius: 40px; }

        /* ZIG-ZAG LAYOUT */
        .sekcja-tresci { padding: 100px 20px; display: flex; justify-content: center; }
        .kontener-rapow { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 80px; }
        
        .blok-rapu { display: flex; align-items: center; justify-content: space-between; gap: 40px; background: linear-gradient(135deg, rgba(15,0,0,0.9), rgba(5,0,0,0.95)); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 77, 0, 0.1); }
        
        .blok-rapu:nth-child(odd) { flex-direction: row-reverse; } 
        .blok-rapu:nth-child(even) { flex-direction: row; }      

        .rap-tekst { flex: 1; }
        .rap-foto-kontener { flex: 1; border-radius: 12px; overflow: hidden; border: 2px solid var(--bordo); }
        .rap-zdjecie { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
        .rap-tytul { font-family: var(--czcionka-tytuly); font-size: 2.2rem; margin-bottom: 10px; }
        .rap-link { color: var(--pomarancz-ognisty); font-weight: 800; display: block; margin-bottom: 15px; }
        .rap-opis { color: var(--kolor-tekstu-ciemny); }

        /* STOPKA */
        .glowna-stopka { text-align: center; padding: 40px; border-top: 1px solid var(--bordo); background: rgba(5,0,0,0.5); color: var(--kolor-tekstu-ciemny); }
        .tworca-akcent { color: var(--czerwien-zywa); font-weight: 800; }

        /* MOBILKI */
        @media (max-width: 768px) { 
            #centralne-graffiti { font-size: 45vw; } 
            .strzalki-grupa { display: none; } 
            .blok-rapu { flex-direction: column !important; text-align: center; padding: 25px; } 
            .nazwa-uzytkownika { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <img src="6.png" id="logo-loading" alt="Ładowanie..." onerror="this.style.display='none'">
        <div class="loader-shell">
            <div id="loader-bar"></div>
        </div>
    </div>

    <div id="centralne-graffiti">777</div>
    <nav class="glowna-nawigacja">
        <div class="nawigacja-kontener">
            <div class="logo">ANT£KNIGHT</div>
            <ul style="display: flex; gap: 30px;">
                <li><a href="#sekcja-start" class="menu-link">Start</a></li>
                <li><a href="#sekcja-rap" class="menu-link">Wideo</a></li>
            </ul>
        </div>
    </nav>
    <main>
        <section id="sekcja-start" class="sekcja-hero">
            <div class="hero-z-strzalkami">
                <div class="strzalki-grupa">
                    <div class="strzalka-w-dol">&gt;</div><div class="strzalka-w-dol">&gt;</div><div class="strzalka-w-dol">&gt;</div>
                </div>
                <div class="profil-kontener">
                    <h1 class="nazwa-uzytkownika">ANT£KNIGHT</h1>
                    <a href="https://www.tiktok.com/@realantek0" target="_blank" class="przycisk-kanal">nie masz nic do stracenia wbijaj na kanał &lt;3</a>
                </div>
                <div class="strzalki-grupa">
                    <div class="strzalka-w-dol">&gt;</div><div class="strzalka-w-dol">&gt;</div><div class="strzalka-w-dol">&gt;</div>
                </div>
            </div>
        </section>
        <section id="sekcja-rap" class="sekcja-tresci">
            <div id="kontener-rapow" class="kontener-rapow"></div>
        </section>
    </main>
    <footer class="glowna-stopka">
        <p>twórca strony: <span class="tworca-akcent">PARZYCH</span></p>
        <p>&copy; 2026 ANT£KNIGHT. Wszystkie prawa zastrzeżone.</p>
    </footer>

    <script>
        "use strict";
        // LOGIKA ŁADOWANIA (1.5s min)
        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loading-screen');
            const loaderBar = document.getElementById('loader-bar');
            let startTime = Date.now();
            let minDuration = 1500; 

            let timer = setInterval(() => {
                let timeElapsed = Date.now() - startTime;
                let progress = (timeElapsed / minDuration) * 100;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => loadingScreen.style.display = 'none', 500);
                }
                loaderBar.style.width = progress + '%';
            }, 20);
        });

        const ListaRapow = [
            { tytul: "Zygzak McQueen", linkUrl: "https://www.tiktok.com/@realantek0/video/7660432514841873697", linkTekst: "▶ Sprawdź wideo", zdjecie: "2.jpeg", opis: "Pierwsza wrzuta, która poszła w eter. Surowy bit i mocne pancze. Sprawdźcie to." },
            { tytul: "Brand_", linkUrl: "https://www.tiktok.com/@realantek0/video/7652597700927442198", linkTekst: "▶ Sprawdź wideo", zdjecie: "1.jpeg", opis: "Drugi track zrobiony na szybkości. Kręcone wieczorem, czysta energia." },
            { tytul: "Rachunek?!?", linkUrl: "https://www.tiktok.com/@realantek0/video/7634966843362528534", linkTekst: "▶ Zobacz klip", zdjecie: "5.jpeg", opis: "Trochę inne flow. Nocny klimat, ciężki bas i refleksja nad miastem." },
            { tytul: "Otworzyć się na ludzi !", linkUrl: "https://www.tiktok.com/@realantek0/video/7624817143925706016", linkTekst: "▶ Posłuchaj całości", zdjecie: "4.jpeg", opis: "Czwarta wklejka, zamykająca pierwszą serię. Następne produkcje już w drodze." }
        ];

        const Kontener = document.getElementById("kontener-rapow");
        function ZbudujRapy() {
            if (!Kontener) return;
            ListaRapow.forEach(dane => {
                const Blok = document.createElement("div");
                Blok.className = "blok-rapu";
                Blok.innerHTML = `
                    <div class="rap-foto-kontener">
                        <img src="${dane.zdjecie}" class="rap-zdjecie" alt="${dane.tytul}">
                    </div>
                    <div class="rap-tekst">
                        <h2 class="rap-tytul">${dane.tytul}</h2>
                        <a href="${dane.linkUrl}" target="_blank" class="rap-link">${dane.linkTekst}</a>
                        <p class="rap-opis">${dane.opis}</p>
                    </div>
                `;
                Kontener.appendChild(Blok);
            });
        }
        document.addEventListener("DOMContentLoaded", ZbudujRapy);
    </script>
</body>
</html>
